<meta charset="utf-8">
<title>카시오 시계 카드뉴스 · 인스타 후킹형 — i_s2_fashion</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
<style>
  :root {
    --ink:#101012; --mute:#8b8b90; --accent:#ff3366; --paper:#ffffff; --chip:#f4f3f1;
    --sans:"Pretendard Variable","Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:#141416; color:#cfcfca; font-family:var(--sans); padding:42px 20px 100px; }
  .head { max-width:1180px; margin:0 auto 8px; text-align:center; }
  .head h1 { font-size:20px; color:#fff; font-weight:700; margin:0 0 10px; }
  .head p { font-size:13px; color:#96938c; line-height:1.7; margin:0; }
  .toolbar { max-width:1180px; margin:20px auto 34px; display:flex; justify-content:center; gap:10px; }
  .toolbar button { font-family:var(--sans); font-size:11px; font-weight:600; letter-spacing:.16em; text-transform:uppercase; color:#111; background:#e8e5de; border:none; border-radius:2px; padding:12px 22px; cursor:pointer; }
  .board { max-width:1180px; margin:0 auto; display:grid; grid-template-columns:repeat(auto-fit, minmax(270px,1fr)); gap:40px 26px; justify-items:center; }
  .col { width:100%; max-width:360px; }
  .cap { display:flex; justify-content:space-between; align-items:center; margin:14px 2px 0; font-size:10.5px; color:#8f8c85; letter-spacing:.14em; text-transform:uppercase; }
  .cap button { font-family:var(--sans); font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:#cfccc5; background:transparent; border:1px solid rgba(255,255,255,.18); border-radius:2px; padding:6px 11px; cursor:pointer; }
  .slot { width:100%; }

  /* ── 카드: 540x675 (내보내기 2x = 1080x1350) ── */
  .card { position:relative; width:540px; height:675px; overflow:hidden; background:var(--paper); color:var(--ink);
          font-family:var(--sans); transform-origin:top left; display:flex; flex-direction:column; padding:30px 32px 24px; }

  .toprow { display:flex; justify-content:space-between; align-items:center; flex:none; margin-bottom:14px; }
  .handle { font-size:11px; font-weight:700; letter-spacing:.08em; color:var(--ink); }
  .num { font-size:15px; font-weight:800; color:var(--accent); font-variant-numeric:tabular-nums; letter-spacing:.02em; }

  .photo { flex:none; align-self:center; border-radius:6px; overflow:hidden; position:relative; }
  .photo img { width:100%; height:100%; object-fit:contain; display:block; }
  .badge { position:absolute; top:10px; left:10px; background:var(--accent); color:#fff; font-size:14px; font-weight:800;
           padding:6px 10px; border-radius:4px; letter-spacing:.02em; }

  .caption { flex:1 1 auto; min-height:0; display:flex; flex-direction:column; justify-content:center; }
  .title { margin:0; font-weight:800; font-size:31px; line-height:1.3; letter-spacing:-.5px; word-break:keep-all; }
  .title em { font-style:normal; box-shadow:inset 0 -14px 0 #ffe14d; }
  .metarow { display:flex; align-items:center; gap:10px; margin-top:12px; flex-wrap:wrap; }
  .meta { font-size:14px; font-weight:700; color:var(--ink); }
  .meta s { color:#b6b3ac; font-weight:500; margin-right:4px; }
  .proof { display:inline-block; background:var(--chip); border-radius:99px; padding:6px 12px; font-size:12px; font-weight:600; color:#55555a; }
  .credit { font-size:8px; color:#bdbab3; margin-top:10px; }
  .selling { margin-top:9px; font-size:12.5px; font-weight:600; color:#55555a; line-height:1.6; word-break:keep-all;
             border-top:1px solid #efedea; padding-top:9px; }

  .foot { flex:none; display:flex; justify-content:space-between; align-items:center; margin-top:10px;
          font-size:11px; font-weight:700; color:var(--mute); }

  /* 표지 */
  .card.cover .title { font-size:47px; line-height:1.22; letter-spacing:-1px; }
  .card.cover .kicker { font-size:14px; font-weight:800; color:var(--accent); letter-spacing:.14em; margin-bottom:10px; }
  .card.cover .sub { font-size:14.5px; font-weight:600; color:#55555a; margin:14px 0 0; line-height:1.6; }
  .card.cover .caption { align-items:flex-start; text-align:left; }

  /* CTA */
  .card.cta .title { font-size:38px; line-height:1.28; letter-spacing:-.8px; }
  .card.cta .sub { font-size:14.5px; font-weight:600; color:#55555a; margin:14px 0 0; line-height:1.7; }

  /* 상품명 라인 (사용자 요청: 디자인에 상품명 표기) */
  .prodline { font-size:12px; font-weight:600; color:#8b8b90; margin-bottom:8px; letter-spacing:-.1px; }
  .prodline b { color:#101012; font-weight:800; }
</style>

  function cardHTML(c, idx){
    var m = META[c.img];
    var pw = c.pw || 330;
    var ph = Math.round(pw * m.h / m.w);
    if (ph > 330) { ph = 330; pw = Math.round(ph * m.w / m.h); }
    var photo = '<div class="photo" style="width:' + pw + 'px;height:' + ph + 'px;background:' + m.bg + '">'
              + '<img src="' + IMAGES[c.img] + '" alt="">'
              + (c.badge ? '<span class="badge">' + c.badge + '</span>' : '')
              + '</div>';
    var body;
    if (c.kind === "cover") {
      body = '<div class="caption"><div class="kicker">' + c.kicker + '</div>'
           + '<h2 class="title">' + c.title + '</h2>'
           + '<p class="sub">' + c.sub + '</p></div>';
    } else if (c.kind === "cta") {
      body = '<div class="caption" style="text-align:center;align-items:center">'
           + '<h2 class="title">' + c.title + '</h2>'
           + '<p class="sub">' + c.sub + '</p></div>';
    } else {
      body = '<div class="caption">'
           + (c.prod ? '<div class="prodline">' + c.prod + '</div>' : '')
           + '<h2 class="title">' + c.title + '</h2>'
           + '<div class="metarow"><span class="meta">' + c.meta_ + '</span><span class="proof">' + c.proof + '</span></div>'
           + (c.cr ? '<div class="credit">' + c.cr + '</div>' : '')
           + (c.sp ? '<div class="selling">' + c.sp + '</div>' : '')
           + '</div>';
    }
    return '<div class="card ' + c.kind + '" id="card' + idx + '">'
      + '<div class="toprow"><span class="handle">' + HANDLE + '</span>'
      + '<span class="num">' + (idx + 1) + '<span style="color:#c9c6bf">/' + CARDS.length + '</span></span></div>'
      + photo + body
      + '<div class="foot"><span>' + (idx < CARDS.length - 1 ? '옆으로 넘기기 &rarr;' : '&nbsp;') + '</span></div>'
      + '</div>';
  }

  var board = document.getElementById("board");
  CARDS.forEach(function(c, k){
    var col = document.createElement("div"); col.className = "col";
    col.innerHTML = '<div class="slot">' + cardHTML(c, k) + '</div>'
      + '<div class="cap"><span>0' + (k + 1) + ' &middot; ' + c.lab + '</span>'
      + '<button onclick="exportCard(' + k + ')">PNG</button></div>';
    board.appendChild(col);
  });

  function fit(){
    document.querySelectorAll(".slot").forEach(function(s){
      var card = s.querySelector(".card");
      var scale = Math.min(1, s.clientWidth / 540);
      card.style.transform = "scale(" + scale + ")";
      s.style.height = (675 * scale) + "px";
    });
  }
  window.addEventListener("resize", fit);
  fit();

  function exportCard(k){
    var card = document.getElementById("card" + k);
    if (!window.htmlToImage) { alert("내보내기 모듈 로딩 중입니다. 잠시 후 다시 눌러주세요."); return; }
    var prev = card.style.transform;
    card.style.transform = "none";
    return document.fonts.ready.then(function(){
      return window.htmlToImage.toPng(card, { pixelRatio:2, cacheBust:true, backgroundColor:"#ffffff" });
    }).then(function(url){
      card.style.transform = prev;
      var a = document.createElement("a"); a.download = "uvparasol-" + (k + 1) + ".png"; a.href = url; a.click();
    });
  }
  function exportAll(){
    var chain = Promise.resolve();
    CARDS.forEach(function(_, k){
      chain = chain.then(function(){ return exportCard(k); }).then(function(){
        return new Promise(function(r){ setTimeout(r, 350); });
      });
    });
    return chain;
  }
  var s = document.createElement("script");
  s.src = "https://cdn.jsdelivr.net/npm/html-to-image@1.11.13/dist/html-to-image.js";
  document.head.appendChild(s);
</script>
