<meta charset="utf-8">
<title>롱스커트 카드뉴스 A안 · 에디토리얼 — i_s2_fashion</title>
<style>
  :root {
    --paper:#e8e8e5; --ink:#17181a; --ink2:#6c6e72; --line:rgba(23,24,26,.16);
    --steel:#7d868d; --bone:#d9d8d2; --bone2:#8d8d88;
    --sans:"Pretendard","Helvetica Neue","Malgun Gothic","Apple SD Gothic Neo",system-ui,sans-serif;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:#0e0f10; color:#b7b7b3; font-family:var(--sans); padding:46px 20px 100px; }
  .page-head { max-width:1180px; margin:0 auto 10px; text-align:center; }
  .page-head h1 { font-size:20px; margin:0 0 10px; color:#f2f1ec; font-weight:500; letter-spacing:.12em; }
  .page-head p { margin:0; color:#85857f; font-size:13px; line-height:1.8; }
  .toolbar { max-width:1180px; margin:22px auto 40px; display:flex; gap:10px; justify-content:center; }
  .toolbar button { font-family:var(--sans); font-size:11px; font-weight:500; letter-spacing:.18em; text-transform:uppercase; color:#0e0f10; background:#e8e8e5; border:none; padding:12px 22px; cursor:pointer; }
  .toolbar button:hover { background:#fff; }
  .deck { max-width:1180px; margin:0 auto; display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:48px; justify-items:center; }
  .slot { width:100%; max-width:540px; }
  .cap { display:flex; justify-content:space-between; align-items:center; margin:16px 2px 0; font-size:10.5px; color:#74746f; letter-spacing:.2em; text-transform:uppercase; }
  .cap button { font-family:var(--sans); font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:#b7b7b3; background:transparent; border:1px solid rgba(255,255,255,.16); padding:7px 13px; cursor:pointer; }
  .cap button:hover { border-color:rgba(255,255,255,.4); color:#f2f1ec; }

  /* ── 카드(플레이트) 540x675 → export 2x = 1080x1350 ── */
  .card { position:relative; width:540px; height:675px; overflow:hidden; border-radius:2px;
          background:var(--paper); color:var(--ink); font-family:var(--sans); transform-origin:top left;
          box-shadow:0 30px 64px rgba(0,0,0,.5); }
  .card::after { content:""; position:absolute; inset:20px; border:1px solid var(--line); pointer-events:none; z-index:2; }

  .toprow { position:absolute; top:42px; left:52px; right:52px; z-index:3; display:flex; justify-content:space-between; align-items:baseline; }
  .brand-mark { font-size:10.5px; letter-spacing:.28em; font-weight:600; color:var(--ink2); text-transform:uppercase; }
  .plate { font-size:10.5px; letter-spacing:.22em; font-weight:500; color:var(--steel); font-variant-numeric:tabular-nums; }

  /* 아이템 카드: 사진 + 캡션 */
  .stage { position:absolute; inset:0; z-index:1; display:flex; flex-direction:column; padding:82px 52px 92px; }
  /* 정사각 원본(1:1)과 같은 비율 → 레터박스 0, 잘림 0 */
  .photo { flex:none; width:360px; height:360px; align-self:center; border:1px solid var(--line); overflow:hidden; }
  .photo img { width:100%; height:100%; object-fit:contain; display:block; }
  .caption { flex:1 1 auto; min-height:0; display:flex; flex-direction:column; justify-content:flex-end; }
  .eyebrow { font-size:11px; letter-spacing:.2em; font-weight:500; color:var(--steel); margin:0 0 12px; }
  .title { font-size:27px; line-height:1.35; margin:0; font-weight:600; letter-spacing:-.3px; color:var(--ink); word-break:keep-all; }
  .lead { font-size:13.5px; line-height:1.8; margin:12px 0 0; color:var(--ink2); word-break:keep-all; }
  .credit { position:absolute; right:52px; bottom:74px; z-index:3; font-size:8.5px; color:#a2a29c; letter-spacing:.04em; }

  .foot { position:absolute; left:52px; right:52px; bottom:42px; z-index:3; display:flex; justify-content:space-between; align-items:center;
          font-size:10.5px; letter-spacing:.24em; font-weight:500; color:var(--ink2); text-transform:uppercase; }
  .foot .pg { font-variant-numeric:tabular-nums; color:var(--ink); letter-spacing:.18em; }

  /* 표지/CTA: 다크 플레이트(텍스트 온리) */
  .card.dark { background:linear-gradient(180deg,#1b1c1e 0%,#161719 100%); color:var(--bone); }
  .card.dark::after { border-color:rgba(255,255,255,.15); }
  .card.dark .brand-mark { color:var(--bone2); }
  .card.dark .plate { color:#9aa0a5; }
  .card.dark .stage { justify-content:flex-end; padding:52px 52px 128px; }
  .card.dark .overline { font-size:11px; letter-spacing:.32em; font-weight:500; color:#9aa0a5; margin-bottom:22px; text-transform:uppercase; }
  .card.dark .title { font-size:44px; line-height:1.2; letter-spacing:-.6px; color:var(--bone); }
  .card.dark .lead { color:var(--bone2); font-size:15px; margin-top:20px; }
  .card.dark .foot { color:var(--bone2); }
  .card.dark .foot .pg { color:var(--bone); }
</style>

        + (c.cr ? '<div class="credit">' + c.cr + '</div>' : '');
    }
    return '<div class="card ' + (c.kind === "dark" ? "dark" : "") + '" id="card' + i + '">' + top + stage + foot + '</div>';
  }

  var deck = document.getElementById("deck");
  CARDS.forEach(function(c, k){
    var slot = document.createElement("div"); slot.className = "slot";
    slot.innerHTML = cardHTML(c, k)
      + '<div class="cap"><span>' + pad2(k+1) + ' &middot; ' + c.lab + '</span>'
      + '<button onclick="exportCard(' + k + ')">이 장 PNG</button></div>';
    deck.appendChild(slot);
  });

  function fit(){
    document.querySelectorAll(".slot").forEach(function(s){
      var card = s.querySelector(".card");
      var scale = Math.min(1, s.clientWidth / 540);
      card.style.transform = "scale(" + scale + ")";
      card.style.marginBottom = (675 * (scale - 1)) + "px";
    });
  }
  window.addEventListener("resize", fit);

  function exportCard(k){
    var card = document.getElementById("card" + k);
    if (!window.htmlToImage) { alert("내보내기 모듈 로딩 중… 잠시 후 다시 눌러주세요."); return; }
    var prev = card.style.transform;
    card.style.transform = "none";
    return document.fonts.ready.then(function(){
      return window.htmlToImage.toPng(card, { pixelRatio:2, cacheBust:true, backgroundColor:"#ffffff" });
    }).then(function(url){
      card.style.transform = prev;
      var a = document.createElement("a"); a.download = "longskirt-a-" + pad2(k+1) + ".png"; a.href = url; a.click();
    });
  }
  function exportAll(){
    var chain = Promise.resolve();
    CARDS.forEach(function(_, k){
      chain = chain.then(function(){ return exportCard(k); })
                   .then(function(){ return new Promise(function(r){ setTimeout(r, 400); }); });
    });
  }

  (function init(){
    var s = document.createElement("script");
    s.src = "https://cdn.jsdelivr.net/npm/html-to-image@1.11.13/dist/html-to-image.js";
    s.onload = fit; document.head.appendChild(s);
    fit();
  })();
</script>
